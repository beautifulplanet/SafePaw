# =============================================================
# SafePaw Docker Compose — Secure AI Deployer
# =============================================================
# SafePaw wraps your AI assistant in a hardened Docker environment:
#   1. Setup Wizard UI (Go) — guided configuration on :3000
#   2. Security Gateway (Go) — reverse proxy with rate limiting,
#      input sanitization, and auth on :8080
#   3. AI Assistant (Node.js) — the actual AI (internal)
#   4. Redis + Postgres — internal state (no exposed ports)
#
# SYSTEM PROFILES (set SYSTEM_PROFILE in .env):
#   small      (4-8 GB)   — lightweight, 7B models
#   medium     (16-32 GB) — balanced, 13-30B models
#   large      (64-128 GB)— powerful, 70B models
#   very-large (128+ GB)  — maximum, 100B+ / multiple models
#
# Memory per profile:         small  medium  large  very-large
#   Wizard                     128M   128M    256M   256M
#   Gateway                    256M   512M    1G     2G
#   AI Assistant               2G     8G      32G    96G
#   Redis                      256M   512M    2G     4G
#   Postgres                   256M   1G      4G     8G
#
# SECURITY NOTES:
#   - All secrets come from .env (NEVER hardcode)
#   - Copy .env.example → .env before first run
#   - Only Wizard (:3000) and Gateway (:8080) are host-exposed
#   - AI, Redis, and Postgres are unreachable from host
#   - Images pinned by SHA256 digest (supply-chain integrity)
#   - Non-root containers where possible
#   - Docker socket is proxied (wizard never touches raw socket)
# =============================================================

services:
  # ------------------------------------------------
  # Wizard — Setup & Configuration UI (Go)
  # ------------------------------------------------
  # The "IKEA assembly" experience: open browser, paste API
  # keys, click "Connect Discord", done. Embeds a React SPA
  # via go:embed (single binary, no nginx).
  wizard:
    build:
      context: ./services/wizard
      dockerfile: Dockerfile
    container_name: safepaw-wizard
    environment:
      WIZARD_PORT: "3000"
      WIZARD_ADMIN_PASSWORD: ${WIZARD_ADMIN_PASSWORD:-}
      WIZARD_TOTP_SECRET: ${WIZARD_TOTP_SECRET:-}
      DOCKER_HOST: tcp://docker-socket-proxy:2375
      COMPOSE_FILE_PATH: "/app/docker-compose.yml"
      ENV_FILE_PATH: "/app/.env"
      SECURE_COOKIES: ${SECURE_COOKIES:-false}
      OPENCLAW_HEALTH_URL: "http://openclaw:18789/health"
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      POSTGRES_HOST: "postgres"
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:3000:3000"  # Wizard UI — localhost only
    networks:
      - safepaw-internal
    volumes:
      - ./.env:/app/.env:rw
    depends_on:
      docker-socket-proxy:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${WIZARD_MEM_LIMIT:-128M}
          cpus: '0.25'
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ------------------------------------------------
  # Docker Socket Proxy — Least-Privilege Docker Access
  # ------------------------------------------------
  # The wizard needs Docker API access for health checks,
  # container listing, and service restarts. Instead of
  # mounting the raw Docker socket (which grants root-level
  # access to the host), we proxy through tecnativa/docker-
  # socket-proxy which allowlists only specific API endpoints.
  #
  # ALLOWED: _ping, containers (list, inspect, restart)
  # BLOCKED: exec, create, images, volumes, networks, etc.
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3
    container_name: safepaw-docker-proxy
    environment:
      # Allow only what the wizard needs
      CONTAINERS: 1    # GET /containers/json, GET /containers/{id}/json
      POST: 1          # POST /containers/{id}/restart
      # Everything else is denied by default:
      # IMAGES=0, NETWORKS=0, VOLUMES=0, EXEC=0, BUILD=0, etc.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - safepaw-internal
    # NO ports exposed to host — internal only
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 32M
          cpus: '0.1'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:2375/_ping || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ------------------------------------------------
  # Gateway — Security Reverse Proxy (Go)
  # ------------------------------------------------
  # Sits in front of OpenClaw. Provides:
  #   - Rate limiting (30 conn/min per IP)
  #   - Input sanitization (prompt injection defense)
  #   - HMAC-SHA256 auth for API access
  #   - Security headers (HSTS, CSP, X-Frame-Options)
  #   - TLS termination (optional)
  #   - Message size guards (64KB max)
  # OpenClaw is unreachable except through this proxy.
  gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    container_name: safepaw-gateway
    environment:
      GATEWAY_PORT: "8080"
      # Reverse proxy target — OpenClaw's internal address
      PROXY_TARGET: "http://openclaw:18789"
      # Rate limiting
      RATE_LIMIT: ${RATE_LIMIT:-60}
      RATE_LIMIT_WINDOW_SEC: ${RATE_LIMIT_WINDOW_SEC:-60}
      # Auth (enabled by default in Docker deploy — disable with AUTH_ENABLED=false for dev only)
      AUTH_ENABLED: ${AUTH_ENABLED:-true}
      AUTH_SECRET: ${AUTH_SECRET:-}
      AUTH_DEFAULT_TTL_HOURS: ${AUTH_DEFAULT_TTL_HOURS:-24}
      AUTH_MAX_TTL_HOURS: ${AUTH_MAX_TTL_HOURS:-168}
      # TLS (optional)
      TLS_ENABLED: ${TLS_ENABLED:-false}
      TLS_CERT_FILE: ${TLS_CERT_FILE:-/certs/tls.crt}
      TLS_KEY_FILE: ${TLS_KEY_FILE:-/certs/tls.key}
      TLS_PORT: ${TLS_PORT:-8443}
      # Redis (for rate limiter state, optional)
      # Structured logging (json for SIEM, text for dev)
      LOG_FORMAT: ${LOG_FORMAT:-text}
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      # Gateway is the public-facing entry point
      - "127.0.0.1:8080:8080"  # Bind to localhost ONLY (not 0.0.0.0)
    networks:
      - safepaw-internal
    depends_on:
      openclaw:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${GATEWAY_MEM_LIMIT:-256M}
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ------------------------------------------------
  # AI Assistant — Personal AI (Node.js)
  # ------------------------------------------------
  # The actual AI assistant. Handles all channels (Discord,
  # Telegram, Slack, WhatsApp, Signal, etc.), LLM providers,
  # tools, voice, and the Control UI.
  # INTERNAL ONLY — all traffic must go through the Gateway.
  # Built from services/openclaw/Dockerfile (openclaw installed at build time).
  #
  # SECURITY: bind=localhost, controlUi requires gateway proxy,
  # no --allow-unconfigured in production.
  openclaw:
    build:
      context: ${OPENCLAW_BUILD_CONTEXT:-../../openclaw}
      dockerfile: Dockerfile
    container_name: safepaw-openclaw
    command: >
      sh -c '
        mkdir -p /home/node/.openclaw &&
        echo "{\"gateway\":{\"bind\":\"lan\",\"mode\":\"local\",\"controlUi\":{\"enabled\":true}}}" > /home/node/.openclaw/openclaw.json &&
        exec node openclaw.mjs gateway --port 18789 --bind lan
      '
    environment:
      # OpenClaw reads config from ~/.openclaw/openclaw.json
      # and env vars for channel tokens.
      NODE_ENV: production
      # LLM Provider (set in .env)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Channel tokens (set in .env via Wizard UI)
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SLACK_APP_TOKEN: ${SLACK_APP_TOKEN:-}
      SIGNAL_CLI_PATH: ${SIGNAL_CLI_PATH:-}
    # NO ports exposed to host — Gateway proxies all traffic
    networks:
      - safepaw-internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${OPENCLAW_MEM_LIMIT:-2G}
          cpus: '2.0'
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ------------------------------------------------
  # Redis — State & Rate Limiting
  # ------------------------------------------------
  redis:
    image: redis:7-alpine@sha256:02f2cc4882f8bf87c79a220ac958f58c700bdec0dfb9b9ea61b62fb0e8f1bfcf
    container_name: safepaw-redis
    command: redis-server --requirepass "${REDIS_PASSWORD}" --maxmemory "${REDIS_MAXMEMORY:-128mb}" --maxmemory-policy allkeys-lru --appendonly yes --rename-command FLUSHALL "" --rename-command FLUSHDB "" --rename-command DEBUG ""
    networks:
      - safepaw-internal
    # PORTS INTENTIONALLY NOT EXPOSED TO HOST
    volumes:
      - redis-data:/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${REDIS_MEM_LIMIT:-256M}
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ------------------------------------------------
  # Postgres — Configuration & State
  # ------------------------------------------------
  postgres:
    image: postgres:16-alpine@sha256:97ff59a4e30e08d1c11bdcd9455e7832368c0572b576c9092cde2df4ae5552a3
    container_name: safepaw-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    command: >
      postgres
        -c shared_buffers=${POSTGRES_SHARED_BUFFERS:-128MB}
        -c effective_cache_size=${POSTGRES_CACHE_SIZE:-256MB}
    networks:
      - safepaw-internal
    # PORTS INTENTIONALLY NOT EXPOSED TO HOST
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./services/postgres/init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${POSTGRES_MEM_LIMIT:-256M}
          cpus: '0.5'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  safepaw-internal:
    driver: bridge
    # Wizard (:3000) and Gateway (:8080) are the only host-exposed ports.
  # AI, Redis, and Postgres are unreachable from outside.
volumes:
  redis-data:
  postgres-data:
  openclaw-home:       # Persists OpenClaw config (~/.openclaw)
  openclaw-workspace:  # Persists agent workspace
