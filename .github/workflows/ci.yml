name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Gateway ──────────────────────────────────────────
  gateway:
    name: Gateway (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/gateway

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: "1.24"
          cache-dependency-path: services/gateway/go.sum

      - name: Build
        run: go build -v ./...

      - name: Check go.mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Test
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Coverage threshold (>65%)
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Gateway coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 65" | bc -l) )); then
            echo "::error::Coverage ${COVERAGE}% is below 65% threshold"
            exit 1
          fi

      - name: Fuzz tests (seed corpus)
        run: go test -run "Fuzz" -v ./...

      - name: Upload coverage
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: gateway-coverage
          path: services/gateway/coverage.out

  # ── Wizard ───────────────────────────────────────────
  wizard:
    name: Wizard (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/wizard

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: "1.24"
          cache: false

      - name: Build
        run: go build -v ./...

      - name: Check go.mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod
          if [ -f go.sum ]; then git diff --exit-code go.sum; fi

      - name: Test
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Coverage threshold (>=55%)
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Wizard coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 55" | bc -l) )); then
            echo "::error::Coverage ${COVERAGE}% is below 55% threshold"
            exit 1
          fi

      - name: Upload coverage
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: wizard-coverage
          path: services/wizard/coverage.out

  # ── Lint ─────────────────────────────────────────────
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: "1.24"
          cache-dependency-path: services/gateway/go.sum

      - name: golangci-lint (gateway)
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: latest
          working-directory: services/gateway
          args: --timeout=5m

      - name: golangci-lint (wizard)
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: latest
          working-directory: services/wizard
          args: --timeout=5m

  # ── Security Scan ────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: "1.24"
          cache-dependency-path: services/gateway/go.sum

      - name: Install security tools
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@v2.22.4
          go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Fetch modules (gateway)
        run: go mod download
        working-directory: services/gateway

      - name: gosec (gateway)
        run: gosec -exclude=G104,G706 -exclude-dir=tools ./...
        working-directory: services/gateway

      - name: gosec (wizard)
        run: gosec -exclude=G115,G704,G706 ./...
        working-directory: services/wizard

      - name: govulncheck (gateway)
        run: govulncheck ./...
        working-directory: services/gateway
        continue-on-error: true  # advisory-only until stabilized — see #13

      - name: govulncheck (wizard)
        run: govulncheck ./...
        working-directory: services/wizard
        continue-on-error: true  # advisory-only until stabilized — see #13

  # ── Docker Build ─────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build gateway image
        run: docker build -t safepaw-gateway:ci ./services/gateway

      - name: Build wizard image
        run: docker build -t safepaw-wizard:ci ./services/wizard

      - name: Verify images
        run: |
          docker images safepaw-gateway:ci
          docker images safepaw-wizard:ci

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin v0.62.1

      - name: Scan gateway image
        run: trivy image --exit-code 1 --severity CRITICAL --ignore-unfixed safepaw-gateway:ci

      - name: Scan wizard image
        run: trivy image --exit-code 1 --severity CRITICAL --ignore-unfixed safepaw-wizard:ci

  # ── OpenClaw Compatibility ─────────────────────────────
  openclaw-compat:
    name: OpenClaw Compatibility
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build OpenClaw image (npm)
        run: |
          docker build \
            --build-arg OPENCLAW_VERSION=$(npm view openclaw version) \
            -t openclaw-compat:ci \
            ./services/openclaw

      - name: Start with SafePaw config
        run: |
          docker run -d --name openclaw-test \
            -e NODE_ENV=production \
            openclaw-compat:ci \
            sh -c '
              mkdir -p /home/node/.openclaw &&
              echo "{\"gateway\":{\"bind\":\"loopback\",\"mode\":\"local\",\"controlUi\":{\"enabled\":true}}}" > /home/node/.openclaw/openclaw.json &&
              exec openclaw gateway --port 18789 --bind loopback
            '

      - name: Wait for healthy (60s timeout)
        run: |
          for i in $(seq 1 30); do
            if ! docker inspect --format='{{.State.Running}}' openclaw-test 2>/dev/null | grep -q true; then
              echo "FAIL: container exited"
              docker logs openclaw-test 2>&1 | tail -20
              exit 1
            fi
            HEALTH=$(docker exec openclaw-test node -e \
              "fetch('http://127.0.0.1:18789/healthz').then(r=>{console.log(r.status);process.exit(r.ok?0:1)}).catch(()=>process.exit(1))" \
              2>/dev/null) || true
            if [ "$HEALTH" = "200" ]; then
              echo "PASS: OpenClaw healthy after $((i*2))s"
              exit 0
            fi
            sleep 2
          done
          echo "FAIL: not healthy within 60s"
          docker logs openclaw-test 2>&1 | tail -20
          exit 1

      - name: Cleanup
        if: always()
        run: docker rm -f openclaw-test 2>/dev/null || true

  # ── Summary ──────────────────────────────────────────
  ci-pass:
    name: CI Pass
    needs: [gateway, wizard, lint, security, docker, openclaw-compat]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.gateway.result }}" != "success" ]] || \
             [[ "${{ needs.wizard.result }}" != "success" ]] || \
             [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.security.result }}" != "success" ]] || \
             [[ "${{ needs.docker.result }}" != "success" ]] || \
             [[ "${{ needs.openclaw-compat.result }}" != "success" ]]; then
            echo "One or more CI jobs failed"
            exit 1
          fi
          echo "All CI checks passed"
